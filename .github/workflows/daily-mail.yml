name: Daily Abstinence Mail

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send even if today's marker already exists"
        required: false
        default: "false"

jobs:
  send-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute China date
        id: china-date
        shell: bash
        run: echo "china_date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore sent marker
        id: sent-marker
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: daily-mail-sent-${{ steps.china-date.outputs.china_date }}

      - name: Validate content library
        if: github.event.inputs.force_send == 'true' || steps.sent-marker.outputs.cache-hit != 'true'
        run: python send_daily_abstinence_mail.py --dry-run

      - name: Send daily email
        if: github.event.inputs.force_send == 'true' || steps.sent-marker.outputs.cache-hit != 'true'
        env:
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
          QQ_MAIL_TO: ${{ secrets.QQ_MAIL_TO }}
        run: python send_daily_abstinence_mail.py

      - name: Create sent marker
        if: github.event.inputs.force_send != 'true' && steps.sent-marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .sent-marker
          echo "${{ steps.china-date.outputs.china_date }}" > .sent-marker/date.txt

      - name: Save sent marker
        if: github.event.inputs.force_send != 'true' && steps.sent-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: daily-mail-sent-${{ steps.china-date.outputs.china_date }}
